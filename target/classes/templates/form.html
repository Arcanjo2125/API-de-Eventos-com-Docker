<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' · Eventos'">Evento</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header class="app-header">
    <div class="app-header__inner">
        <span class="app-header__eyebrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4Z"/></svg>
            Painel de eventos
        </span>
        <h1 th:text="${titulo}">Evento</h1>
        <p>Preencha os dados abaixo para manter a agenda da escola sempre atualizada.</p>
    </div>
</header>

<main class="page">

    <div th:if="${mensagem != null}" class="toast-alert" th:classappend="${tipoMensagem}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path stroke-linecap="round" d="M12 8v5M12 16h0"/></svg>
        <span th:text="${mensagem}"></span>
    </div>

    <div class="form-wrap">
        <div class="form-card">
            <div class="form-card__header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4Z"/></svg>
                <span th:text="${titulo}">Evento</span>
            </div>
            <div class="form-card__body">
                <form th:action="${acao}" th:object="${evento}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="field">
                        <label for="nome">Nome do evento</label>
                        <input type="text" id="nome" th:field="*{nome}"
                               th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'"
                               placeholder="Ex: Feira de Ciências">
                        <span class="field__error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
                    </div>

                    <div class="field">
                        <label for="local">Local</label>
                        <input type="text" id="local" th:field="*{local}"
                               th:classappend="${#fields.hasErrors('local')} ? 'is-invalid'"
                               placeholder="Ex: Auditório Principal">
                        <span class="field__error" th:if="${#fields.hasErrors('local')}" th:errors="*{local}"></span>
                    </div>

                    <div class="field">
                        <label for="data">Data</label>
                        <input type="date" id="data" th:field="*{data}"
                               th:classappend="${#fields.hasErrors('data')} ? 'is-invalid'">
                        <span class="field__error" th:if="${#fields.hasErrors('data')}" th:errors="*{data}"></span>
                        <span class="field__hint">Formato: aaaa-mm-dd</span>
                    </div>

                    <div class="field">
                        <label for="capacidade">Capacidade</label>
                        <input type="number" id="capacidade" th:field="*{capacidade}"
                               th:classappend="${#fields.hasErrors('capacidade')} ? 'is-invalid'"
                               placeholder="Ex: 200" min="1">
                        <span class="field__error" th:if="${#fields.hasErrors('capacidade')}" th:errors="*{capacidade}"></span>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-success">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/></svg>
                            Salvar
                        </button>
                        <a href="/eventos" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</main>

<footer class="app-footer">
    Sistema de Controle de Eventos — projeto acadêmico containerizado com Docker.
</footer>

</body>
</html>
